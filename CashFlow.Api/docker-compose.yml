version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.Api
    container_name: cashflow-api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=cashflow-api.czsq40a84p85.us-east-2.rds.amazonaws.com;Port=5432;Database=postgres;Username=postgres;Password=cashflow;SSL Mode=Require;Trust Server Certificate=true"
      Jwt__Key: "cashflow-super-secret-key-256bits!!"
      Jwt__Issuer: "cashflow-api"
      Jwt__Audience: "cashflow-client"
      Auth__Usuario: "admin"
      Auth__Senha: "cashflow"

      # 🔥 KAFKA
      Kafka__BootstrapServers: "kafka:9092"

    depends_on:
      - kafka

  worker:
    build:
      context: .
      dockerfile: Dockerfile.Worker
    container_name: cashflow-worker
    environment:
      ConnectionStrings__Default: "Host=cashflow-api.czsq40a84p85.us-east-2.rds.amazonaws.com;Port=5432;Database=postgres;Username=postgres;Password=cashflow;SSL Mode=Require;Trust Server Certificate=true"
      Worker__IntervalMs: "2000"
      Worker__BatchSize: "100"
      Worker__MaxRetries: "5"

      # 🔥 KAFKA
      Kafka__BootstrapServers: "kafka:9092"

    depends_on:
      - kafka

  # 🧠 ZOOKEEPER (necessário para Kafka)
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: cashflow-zookeeper
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"

  # 🔥 KAFKA
  kafka:
    image: bitnami/kafka:latest
    container_name: cashflow-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: "zookeeper:2181"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
    depends_on:
      - zookeeper

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: cashflow-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus