version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile.Api
    container_name: cashflow-api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__Default: "Host=cashflow-api.czsq40a84p85.us-east-2.rds.amazonaws.com;Port=5432;Database=postgres;Username=postgres;Password=cashflow;SSL Mode=Require;Trust Server Certificate=true"
      Jwt__Key: "cashflow-super-secret-key-256bits!!"
      Jwt__Issuer: "cashflow-api"
      Jwt__Audience: "cashflow-client"
      Auth__Usuario: "admin"
      Auth__Senha: "cashflow"

      # 🔥 KAFKA
      Kafka__BootstrapServers: "kafka:9092"

    depends_on:
      - kafka

  worker:
    build:
      context: .
      dockerfile: Dockerfile.Worker
    container_name: cashflow-worker
    environment:
      ConnectionStrings__Default: "Host=cashflow-api.czsq40a84p85.us-east-2.rds.amazonaws.com;Port=5432;Database=postgres;Username=postgres;Password=cashflow;SSL Mode=Require;Trust Server Certificate=true"
      Worker__IntervalMs: "2000"
      Worker__BatchSize: "100"
      Worker__MaxRetries: "5"

      # 🔥 KAFKA
      Kafka__BootstrapServers: "kafka:9092"

    depends_on:
      - kafka

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    depends_on:
      - kafka
    ports:
      - 19000:9000
    environment:
      KAFKA_BROKERCONNECT: kafka:29092


  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: cashflow-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus